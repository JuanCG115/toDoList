spring.application.name=toDoList
# Habilitar la consola web de H2 para ver las tablas en el navegador
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuración de la conexión a la base de datos en memoria
spring.datasource.url=jdbc:h2:mem:todolist_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuración de Hibernate
# 'update' hace que Hibernate cree o actualice las tablas de forma automática según nuestras clases de Java
spring.jpa.hibernate.ddl-auto=update
# Muestra las consultas SQL en la consola del IDE para ver qué está pasando por detrás
spring.jpa.show-sql=true